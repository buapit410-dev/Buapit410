<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ห้อง 410 | หนองบัวพิทยาคาร</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS SECTION --- */
        :root {
            --nps-pink: #FFB6C1;
            --nps-blue: #87CEFA;
            --dark-text: #2c3e50;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #fcfcfc;
            color: var(--dark-text);
            line-height: 1.6;
        }

        /* กิมมิก 1: DNA Progress Bar ด้านบนสุด */
        #scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 6px;
            background: linear-gradient(to right, var(--nps-pink), var(--nps-blue));
            z-index: 1001;
            border-radius: 0 5px 5px 0;
            box-shadow: 0 0 10px var(--nps-pink);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: var(--white);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; }
        .school-logo { height: 45px; transition: 0.3s; }
        .school-logo:hover { transform: scale(1.1) rotate(5deg); }
        .room-id { font-weight: 600; margin-left: 10px; color: var(--nps-blue); }

        .nav-buttons { display: flex; align-items: center; gap: 10px; }

        /* ปุ่มเล่นเพลง */
        .play-btn {
            background: var(--nps-pink);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Kanit', sans-serif;
            font-size: 14px;
        }

        /* กิมมิก 2: ปุ่ม Instagram แบบ Glassmorphism */
        .ig-btn {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid var(--nps-pink);
            padding: 6px 12px;
            border-radius: 50px;
            text-decoration: none;
            color: var(--dark-text);
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
        }

        .ig-btn:hover {
            background: var(--nps-pink);
            color: white;
            box-shadow: 0 0 15px var(--nps-pink);
            transform: translateY(-2px);
        }

        .ig-icon { width: 18px; height: 18px; margin-right: 6px; }

        .hero {
            background: linear-gradient(135deg, var(--nps-pink) 0%, var(--nps-blue) 100%);
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .hero h1 { font-size: 2.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.1); }

        main { padding: 40px 5%; }
        .title { text-align: center; margin-bottom: 30px; font-weight: 600; }

        .advisor-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .advisor-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            width: 220px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-bottom: 5px solid var(--nps-blue);
            transition: 0.3s;
        }
        .advisor-card:hover { transform: translateY(-10px); }

        .table-box {
            background: white;
            padding: 40px;
            text-align: center;
            border-radius: 20px;
            border: 2px dashed var(--nps-blue);
            margin: 40px 0;
        }

        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }

        /* กิมมิก 3: การ์ดสมาชิกแบบเรืองแสงเมื่อ Hover */
        .member-card {
            background: white;
            padding: 15px;
            text-align: center;
            border-radius: 10px;
            border: 1px solid #eee;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .member-card:hover { 
            border-color: var(--nps-pink); 
            background: #fff;
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.4);
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div id="scroll-progress"></div>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <nav>
        <div class="logo-area">
            <img src="logo.png" alt="N.P." class="school-logo">
            <span class="room-id">ROOM 410</span>
        </div>
        <div class="nav-buttons">
            <a href="https://www.instagram.com/buapit_410?igsh=NWxobG1ndTl2Zm5o" target="_blank" class="ig-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="IG" class="ig-icon">
                <spanA Instagram </span>
            </a>
            <button id="musicBtn" class="play-btn">🎵 เล่นเพลง</button>
        </div>
    </nav>

    <header class="hero">
        <div>
            <h1>WELCOME TO 410</h1>
            <p>วิทย์ - คณิต | โรงเรียนหนองบัวพิทยาคาร</p>
        </div>
    </header>

    <main>
        <section>
            <h2 class="title">ครูที่ปรึกษา</h2>
            <div class="advisor-grid">
                <div class="advisor-card">
                    <div style="font-size:40px">👨‍🏫</div>
                    <h3>ครูปริยนนท์</h3>
                </div>
                <div class="advisor-card">
                    <div style="font-size:40px">👨‍🏫</div>
                    <h3>ครูชัยยุทธ</h3>
                </div>
            </div>
        </section>

        <section class="table-box">
            <h2 class="title">ตารางเรียน</h2>
            <p>📍 รออัปเดตข้อมูลหลังเปิดเทอม...</p>
        </section>

        <section>
            <h2 class="title">สมาชิกในห้อง (37 คน)</h2>
            <div class="member-grid" id="memberGrid">
                </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Class 410 หนองบัวพิทยาคาร</p>
    </footer>

    <script>
        /* --- JAVASCRIPT SECTION --- */
        
        // 1. สร้างการ์ดเพื่อน 37 คน
        const grid = document.getElementById('memberGrid');
        for (let i = 1; i <= 37; i++) {
            const card = document.createElement('div');
            card.className = 'member-card';
            card.innerHTML = `<div style="color:var(--nps-blue); font-weight:bold;">#${i}</div><small>Member</small>`;
            grid.appendChild(card);
        }

        // 2. ระบบควบคุมเพลง
        const music = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');

        btn.addEventListener('click', () => {
            if (music.paused) {
                music.play();
                btn.innerHTML = "⏸️ หยุดเพลง";
            } else {
                music.pause();
                btn.innerHTML = "🎵 เล่นเพลง";
            }
        });

        // 3. ระบบ DNA Progress Bar (Scroll Tracking)
        window.onscroll = function() {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("scroll-progress").style.width = scrolled + "%";
        };
    </script>
</body>
</html>
