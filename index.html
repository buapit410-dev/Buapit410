<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ห้อง 410 | หนองบัวพิทยาคาร</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS เดิมที่ปรับจูนความสวยงาม --- */
        :root { --nps-pink: #FFB6C1; --nps-blue: #87CEFA; --dark-text: #2c3e50; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Kanit', sans-serif; background-color: #fcfcfc; color: var(--dark-text); overflow-x: hidden; }

        #scroll-progress {
            position: fixed; top: 0; left: 0; width: 0%; height: 6px;
            background: linear-gradient(to right, var(--nps-pink), var(--nps-blue));
            z-index: 1100; border-radius: 0 5px 5px 0;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: var(--white); box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .school-logo { height: 40px; transition: 0.3s; cursor: pointer; }
        .nav-buttons { display: flex; align-items: center; gap: 10px; }

        .play-btn, .ig-btn {
            border: none; padding: 8px 15px; border-radius: 25px; cursor: pointer;
            transition: 0.3s; font-family: 'Kanit', sans-serif; font-size: 13px; text-decoration: none;
        }
        .play-btn { background: var(--nps-pink); color: white; }
        .ig-btn { background: white; border: 2px solid var(--nps-pink); color: var(--dark-text); display: flex; align-items: center; }

        .hero {
            background: linear-gradient(135deg, var(--nps-pink), var(--nps-blue));
            height: 220px; display: flex; align-items: center; justify-content: center; text-align: center; color: white;
        }

        main { padding: 20px 5%; }
        .title { text-align: center; margin: 40px 0 20px; font-weight: 600; color: var(--nps-pink); }

        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px; justify-items: center; margin-bottom: 40px;
        }

        .card {
            background: white; width: 140px; padding: 20px 10px; border-radius: 20px;
            text-align: center; border: 2px solid #f2f2f2; transition: 0.4s; cursor: pointer;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--nps-pink); box-shadow: 0 10px 15px rgba(255, 182, 193, 0.2); }

        .card-img {
            width: 75px; height: 75px; border-radius: 50%;
            background: #f9f9f9; margin: 0 auto 12px; object-fit: cover;
            border: 3px solid var(--nps-blue); display: flex; align-items: center; justify-content: center;
        }

        .card-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
        .card-sub { font-size: 11px; color: #bbb; }

        /* Modal &ปุ่ม IG ในหน้าต่างเด้ง */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white; padding: 40px 20px; border-radius: 25px;
            width: 85%; max-width: 350px; text-align: center; position: relative; animation: zoomIn 0.3s;
        }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 22px; cursor: pointer; color: #ddd; }

        /* ปุ่ม IG ใน Modal */
        .ig-link-btn {
            display: inline-flex; align-items: center; justify-content: center;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white; text-decoration: none; padding: 10px 20px; border-radius: 30px;
            font-size: 14px; font-weight: 600; margin-top: 15px; transition: 0.3s;
        }
        .ig-link-btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(188, 24, 136, 0.4); }

        footer { background: #333; color: white; text-align: center; padding: 25px; font-size: 13px; }
    </style>
</head>
<body>

    <div id="scroll-progress"></div>
    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <nav>
        <div class="logo-area">
            <img src="logo.png" alt="N.P." class="school-logo">
            <span style="font-weight:600; margin-left:10px; color:var(--nps-blue);">Buapit 410</span>
        </div>
        <div class="nav-buttons">
            <a href="https://www.instagram.com/buapit_410?igsh=NWxobG1ndTl2Zm5o" target="_blank" class="ig-btn">IG ห้อง</a>
            <button id="musicBtn" class="play-btn">🎵 เพลง</button>
        </div>
    </nav>

    <header class="hero">
        <div><h1>Welcome to Room 410</h1><p>วิทย์-คณิต | หนองบัวพิทยาคาร</p></div>
    </header>

    <main>
        <h2 class="title">ครูที่ปรึกษา</h2>
        <div class="grid-container">
            <div class="card" onclick="showPopup('ครูปริยนนท์', 'ที่ปรึกษาคนที่ 1', 'teacher1.jpg', '-', '')">
                <img src="teacher1.jpg" class="card-img" onerror="this.src='https://via.placeholder.com/80/87CEFA/ffffff?text=410'">
                <div class="card-name">ครูปริยนนท์</div>
                <div class="card-sub">Advisor</div>
            </div>
            <div class="card" onclick="showPopup('ครูชัยยุทธ', 'ที่ปรึกษาคนที่ 2', 'teacher2.jpg', '-', '')">
                <img src="teacher2.jpg" class="card-img" onerror="this.src='https://via.placeholder.com/80/87CEFA/ffffff?text=410'">
                <div class="card-name">ครูชัยยุทธ</div>
                <div class="card-sub">Advisor</div>
            </div>
        </div>

        <h2 class="title">สมาชิกห้อง (38 คน)</h2>
        <div class="grid-container" id="memberGrid"></div>
    </main>

    <div class="modal" id="infoModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <img id="modalImg" src="" style="width:110px; height:110px; border-radius:50%; margin-bottom:20px; border:4px solid var(--nps-pink); object-fit:cover;">
            <h2 id="modalName">ชื่อ</h2>
            <p id="modalPos" style="color:var(--nps-blue); font-weight:bold; margin-bottom:5px;">ตำแหน่ง</p>
            <p id="modalID" style="font-size: 12px; color: #aaa; margin-bottom: 10px;">เลขประจำตัว: -</p>
            <div id="igContainer"></div> </div>
    </div>

    <footer><p>© 2026 Class 410 หนองบัวพิทยาคาร</p></footer>

        ];

        const mGrid = document.getElementById('memberGrid');
        students.forEach((s, index) => {
            const no = index + 1;
            mGrid.innerHTML += `
                <div class="card" onclick="showPopup('${s.name}', 'เลขที่ ${no}', 'No${no}.jpg', '${s.id}', '${s.ig}')">
                    <img src="No${no}.jpg" class="card-img" onerror="this.src='https://via.placeholder.com/80/87CEFA/ffffff?text=${no}'">
                    <div class="card-name">${s.name.split(' ')[1]}</div>
                    <div class="card-sub">เลขที่ ${no}</div>
                </div>
            `;
        });

        function showPopup(name, pos, img, id, ig) {
            document.getElementById('modalName').innerText = name;
            document.getElementById('modalPos').innerText = pos;
            document.getElementById('modalID').innerText = "เลขประจำตัว: " + id;
            
            const igContainer = document.getElementById('igContainer');
            if(ig) {
                igContainer.innerHTML = `<a href="https://instagram.com/${ig}" target="_blank" class="ig-link-btn">Instagram : ${ig}</a>`;
            } else {
                igContainer.innerHTML = `<p style="color:#888; font-size: 14px; background: #fef1f3; padding: 10px; border-radius: 10px; margin-top:10px;">รอทางเว็บอัพเดทข้อมูล</p>`;
            }

            const mImg = document.getElementById('modalImg');
            mImg.src = img ? img : 'https://via.placeholder.com/120/87CEFA/ffffff?text=410';
            document.getElementById('infoModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('infoModal').style.display = 'none'; }
        window.onclick = (e) => { if (e.target == document.getElementById('infoModal')) closeModal(); }

        const music = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');
        btn.onclick = () => {
            if (music.paused) { music.play(); btn.innerText = "⏸️ หยุด"; }
            else { music.pause(); btn.innerText = "🎵 เพลง"; }
        };

        window.onscroll = () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("scroll-progress").style.width = scrolled + "%";
        };
    </script>
    <script src="posts.js"></script>
</body>
</html>
