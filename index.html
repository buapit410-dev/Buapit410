<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ห้อง 410 | หนองบัวพิทยาคาร</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS SECTION --- */
        :root {
            --nps-pink: #FFB6C1;
            --nps-blue: #87CEFA;
            --dark-text: #2c3e50;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Kanit', sans-serif; background-color: #fcfcfc; color: var(--dark-text); overflow-x: hidden; }

        /* กิมมิก DNA Progress Bar */
        #scroll-progress {
            position: fixed; top: 0; left: 0; width: 0%; height: 6px;
            background: linear-gradient(to right, var(--nps-pink), var(--nps-blue));
            z-index: 1100; box-shadow: 0 0 10px var(--nps-pink);
            border-radius: 0 5px 5px 0;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: var(--white); box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; }
        .school-logo { height: 45px; transition: 0.3s; cursor: pointer; }
        .school-logo:hover { transform: scale(1.1) rotate(5deg); }
        .room-id { font-weight: 600; margin-left: 10px; color: var(--nps-blue); }

        .nav-buttons { display: flex; align-items: center; gap: 10px; }

        /* ปุ่มต่างๆ */
        .play-btn, .ig-btn {
            border: none; padding: 8px 15px; border-radius: 25px; cursor: pointer;
            transition: 0.3s; font-family: 'Kanit', sans-serif; font-size: 14px; text-decoration: none;
        }
        .play-btn { background: var(--nps-pink); color: white; }
        .ig-btn { background: white; border: 2px solid var(--nps-pink); color: var(--dark-text); display: flex; align-items: center; }
        .ig-btn:hover { background: var(--nps-pink); color: white; transform: translateY(-2px); box-shadow: 0 5px 10px rgba(255,182,193,0.3); }

        .hero {
            background: linear-gradient(135deg, var(--nps-pink), var(--nps-blue));
            height: 250px; display: flex; align-items: center; justify-content: center;
            text-align: center; color: white; margin-bottom: 20px;
        }
        .hero h1 { font-size: 2.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.1); }

        main { padding: 0 5%; }
        .title { text-align: center; margin: 40px 0 20px; font-weight: 600; color: var(--nps-pink); }

        /* ระบบ Card สำหรับทุกคน */
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px; justify-items: center; margin-bottom: 50px;
        }

        .card {
            background: white; width: 140px; padding: 15px; border-radius: 20px;
            text-align: center; border: 2px solid #f0f0f0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; position: relative;
        }
        .card:hover { 
            transform: translateY(-10px) rotate(2deg);
            border-color: var(--nps-pink);
            box-shadow: 0 10px 20px rgba(255, 182, 193, 0.3);
        }

        .card-img {
            width: 80px; height: 80px; border-radius: 50%;
            background: #f9f9f9; margin: 0 auto 10px; object-fit: cover;
            border: 3px solid var(--nps-blue);
            display: flex; align-items: center; justify-content: center;
        }

        .card-name { font-size: 14px; font-weight: 600; color: var(--dark-text); }
        .card-sub { font-size: 11px; color: #aaa; }

        /* ตารางเรียนแบบเดิม */
        .table-box {
            background: white; padding: 40px; text-align: center;
            border-radius: 20px; border: 2px dashed var(--nps-blue); margin: 40px 0;
        }

        /* Modal (หน้าต่างเด้งบอกรายละเอียด) */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none;
            justify-content: center; align-items: center; z-index: 2000;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 30px;
            width: 90%; max-width: 400px; text-align: center;
            position: relative; animation: pop 0.3s ease-out;
        }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .close-modal {
            position: absolute; top: 15px; right: 20px; font-size: 25px;
            cursor: pointer; color: #ccc;
        }

        footer { background: #333; color: white; text-align: center; padding: 30px; margin-top: 50px; }
    </style>
</head>
<body>

    <div id="scroll-progress"></div>

    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <nav>
        <div class="logo-area">
            <img src="logo.png" alt="N.P." class="school-logo">
            <span class="room-id">BUAPIT 410</span>
        </div>
        <div class="nav-buttons">
            <a href="https://www.instagram.com/buapit_410?igsh=NWxobG1ndTl2Zm5o" target="_blank" class="ig-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" width="15" style="margin-right:5px;"> IG
            </a>
            <button id="musicBtn" class="play-btn">🎵 เล่นเพลง</button>
        </div>
    </nav>

    <header class="hero">
        <div>
            <h1>WELCOME TO 410</h1>
            <p>วิทย์-คณิต | หนองบัวพิทยาคาร</p>
        </div>
    </header>

    <main>
        <h2 class="title">ครูที่ปรึกษา</h2>
        <div class="grid-container" id="advisorGrid">
            <div class="card" onclick="showDetail('ครูปริยนนท์', 'ที่ปรึกษาคนที่ 1', 'teacher1.jpg', 'รอข้อมูล')">
                <img src="teacher1.jpg" class="card-img" onerror="this.src='https://via.placeholder.com/80/87CEFA/ffffff?text=Teacher'">
                <div class="card-name">ครูปริยนนท์</div>
                <div class="card-sub">Advisor</div>
            </div>
            <div class="card" onclick="showDetail('ครูชัยยุทธ', 'ที่ปรึกษาคนที่ 2', 'teacher2.jpg', 'เรอข้อมูล')">
                <img src="teacher2.jpg" class="card-img" onerror="this.src='https://via.placeholder.com/80/87CEFA/ffffff?text=Teacher'">
                <div class="card-name">ครูชัยยุทธ</div>
                <div class="card-sub">Advisor</div>
            </div>
        </div>

        <section class="table-box">
            <h2 class="title" style="margin-top:0;">ตารางเรียน</h2>
            <p>📍 รอทางฝ่ายวิชาการโรงเรียนจัดตารางเรียน</p>
        </section>

        <h2 class="title">สมาชิกในห้อง (37 คน)</h2>
        <div class="grid-container" id="memberGrid">
            </div>
    </main>

    <div class="modal" id="myModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <img id="modalImg" src="" style="width:120px; height:120px; border-radius:50%; margin-bottom:15px; border:4px solid var(--nps-pink); object-fit:cover;">
            <h2 id="modalName">ชื่อสมาชิก</h2>
            <p id="modalPos" style="color:var(--nps-blue); font-weight:bold; margin-bottom:10px;">ตำแหน่ง/เลขที่</p>
            <p id="modalDesc" style="color:#666;">รายละเอียด...</p>
        </div>
    </div>

    <footer><p>© 2026 Class 410 หนองบัวพิทยาคาร</p></footer>

    <script>
        /* --- JAVASCRIPT SECTION --- */

        // 1. สร้างการ์ดนักเรียน 1-37
        const mGrid = document.getElementById('memberGrid');
        for (let i = 1; i <= 37; i++) {
            mGrid.innerHTML += `
                <div class="card" onclick="showStudentDetail(${i})">
                    <div class="card-img" style="font-weight:bold; color:#ccc; font-size:24px;">#${i}</div>
                    <div class="card-name">Student No.${i}</div>
                    <div class="card-sub">Member</div>
                </div>
            `;
        }

        // 2. ฟังก์ชันแสดงรายละเอียด
        function showDetail(name, pos, img, desc) {
            document.getElementById('modalName').innerText = name;
            document.getElementById('modalPos').innerText = pos;
            document.getElementById('modalDesc').innerText = desc;
            
            const mImg = document.getElementById('modalImg');
            // ถ้าไม่มีรูป ให้ใช้รูป Placeholder สีฟ้า
            mImg.src = img ? img : 'https://via.placeholder.com/120/87CEFA/ffffff?text=410';
            
            document.getElementById('myModal').style.display = 'flex';
        }

        // 3. ฟังก์ชันพิเศษสำหรับนักเรียน (ตามที่แกต้องการ)
        function showStudentDetail(number) {
            showDetail(
                `นักเรียนเลขที่ ${number}`, 
                "สมาชิกห้อง 410", 
                "", 
                "รอการจัดเลขที่จากทางฝ่ายวิชาการโรงเรียน🪪"
            );
        }

        // 4. ระบบเปิด-ปิด Modal
        function closeModal() {
            document.getElementById('myModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('myModal');
            if (event.target == modal) closeModal();
        }

        // 5. ระบบเพลง
        const music = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');
        btn.onclick = () => {
            if (music.paused) { music.play(); btn.innerText = "⏸️ หยุดเพลง"; }
            else { music.pause(); btn.innerText = "🎵 เล่นเพลง"; }
        };

        // 6. DNA Progress Bar
        window.onscroll = () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("scroll-progress").style.width = scrolled + "%";
        };
    </script>
</body>
</html>
